  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>

  <script>
    const APP_BASE = new URL(".", window.location.href);
    const RASTER_BASE = new URL("./assets/overlays/", APP_BASE).href.replace(/\/$/, "");
    const FORECAST_URL = new URL("./forecast.json", APP_BASE).href;

    const MIN_STAGE = -2.0;
    const MAX_STAGE = 14.0;
    const DEFAULT_CENTER = [39.0007, -74.8089];
    const DEFAULT_ZOOM = 13;

    /*
      Fallback only.
      The app now tries to read the real bounds from each .pgw file.
    */
    const FALLBACK_BOUNDS = [
      [38.9851833, -74.8524056],
      [39.0486111, -74.7730000]
    ];

    /*
      NAD83 / New Jersey (ftUS)
      This matches your State Plane-style world file numbers.
    */
    proj4.defs(
      "EPSG:3424",
      "+proj=tmerc +lat_0=38.8333333333333 +lon_0=-74.5 +k=0.9999 +x_0=150000 +y_0=0 +datum=NAD83 +units=us-ft +no_defs"
    );

    let map = null;
    let currentFloodLayer = null;
    let forecastData = null;
    let playTimer = null;
    let overlayOpacity = 1.0;
    let lastRenderToken = 0;
    let mapHasFit = false;

    const boundsCache = new Map();

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function setWarn(msg) {
      const el = document.getElementById("warn");
      if (!msg) {
        el.style.display = "none";
        el.textContent = "";
      } else {
        el.style.display = "block";
        el.textContent = msg;
      }
    }

    function setHardWarn(msg) {
      const el = document.getElementById("hardWarn");
      if (!msg) {
        el.style.display = "none";
        el.textContent = "";
      } else {
        el.style.display = "block";
        el.textContent = msg;
      }
    }

    function setOpacityText() {
      document.getElementById("opacityText").textContent =
        `${Math.round(overlayOpacity * 100)}%`;
    }

    function showStageUrl(text) {
      const box = document.getElementById("urlBox");
      box.style.display = "block";
      box.value = text;
    }

    async function fetchJson(url, params = null) {
      const u = new URL(url);
      if (params) {
        for (const [k, v] of Object.entries(params)) {
          u.searchParams.set(k, v);
        }
      }

      const r = await fetch(u.toString(), { cache: "no-store" });
      if (!r.ok) {
        throw new Error(`HTTP ${r.status} for ${u.toString()}`);
      }
      return r.json();
    }

    async function fetchText(url) {
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) {
        throw new Error(`HTTP ${r.status} for ${url}`);
      }
      return r.text();
    }

    function normalizeStageKey(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return null;

      const clipped = Math.max(MIN_STAGE, Math.min(MAX_STAGE, n));
      return (Math.round(clipped * 10) / 10).toFixed(1);
    }

    function stageKeyToFileStem(stageKey) {
      const num = Number(stageKey);
      const sign = num < 0 ? "m" : "p";
      let absVal = Math.abs(num);
      let whole = Math.floor(absVal + 1e-9);
      let tenth = Math.round((absVal - whole) * 10);

      if (tenth === 10) {
        whole += 1;
        tenth = 0;
      }

      return `NW_FloodDepth_${sign}${String(whole).padStart(2, "0")}_${tenth}_NAVD88`;
    }

    function stageKeyToOverlayUrl(stageKey) {
      return `${RASTER_BASE}/${stageKeyToFileStem(stageKey)}.webp`;
    }

    function overlayUrlToWorldFileUrl(overlayUrl) {
      return overlayUrl.replace(/\.webp(\?.*)?$/i, ".pgw");
    }

    async function loadImageMeta(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();

        img.onload = () => {
          resolve({
            width: img.naturalWidth,
            height: img.naturalHeight
          });
        };

        img.onerror = () => {
          reject(new Error(`Could not load image: ${url}`));
        };

        img.src = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
      });
    }

    async function testImageUrl(url) {
      return new Promise((resolve) => {
        const img = new Image();

        img.onload = () => resolve({ ok: true });
        img.onerror = () => resolve({ ok: false });

        img.src = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
      });
    }

    function ensureMap() {
      if (map) return;

      map = L.map("map", {
        zoomControl: true,
        preferCanvas: false
      }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      document.getElementById("crsText").textContent =
        "Map CRS: Leaflet / OSM basemap with .pgw-derived bounds";
    }

    function clearFloodLayer() {
      if (currentFloodLayer && map) {
        map.removeLayer(currentFloodLayer);
        currentFloodLayer = null;
      }
    }

    function applyOverlayOpacity() {
      if (currentFloodLayer && typeof currentFloodLayer.setOpacity === "function") {
        currentFloodLayer.setOpacity(overlayOpacity);
      }
    }

    function projectStatePlaneToLatLng(x, y) {
      const [lon, lat] = proj4("EPSG:3424", "EPSG:4326", [x, y]);
      return [lat, lon];
    }

    async function getOverlayBoundsFromWorldFile(overlayUrl) {
      if (boundsCache.has(overlayUrl)) {
        return boundsCache.get(overlayUrl);
      }

      const worldFileUrl = overlayUrlToWorldFileUrl(overlayUrl);

      const [pgwText, imageMeta] = await Promise.all([
        fetchText(`${worldFileUrl}?v=${Date.now()}`),
        loadImageMeta(overlayUrl)
      ]);

      const lines = pgwText
        .trim()
        .split(/\r?\n/)
        .map(s => Number(s.trim()));

      if (lines.length < 6 || lines.some(v => !Number.isFinite(v))) {
        throw new Error(`Invalid world file: ${worldFileUrl}`);
      }

      const [A, D, B, E, C, F] = lines;

      if (Math.abs(B) > 1e-12 || Math.abs(D) > 1e-12) {
        setWarn("World file has rotation terms. This app assumes north-up rasters.");
      }

      const width = imageMeta.width;
      const height = imageMeta.height;

      if (!width || !height) {
        throw new Error(`Could not read image size for ${overlayUrl}`);
      }

      /*
        World file:
        A = pixel width
        E = pixel height (negative for north-up)
        C,F = center of upper-left pixel
      */
      const west = C - (A / 2);
      const north = F - (E / 2);
      const east = C + A * (width - 0.5);
      const south = F + E * (height - 0.5);

      const sw = projectStatePlaneToLatLng(west, south);
      const ne = projectStatePlaneToLatLng(east, north);

      const bounds = [sw, ne];
      boundsCache.set(overlayUrl, bounds);
      return bounds;
    }

    async function loadForecast() {
      forecastData = await fetchJson(FORECAST_URL);

      document.getElementById("overlayBaseText").textContent =
        `Overlay base: ${RASTER_BASE}`;

      document.getElementById("issuedText").textContent =
        `Forecast issued: ${forecastData.issuedUtc || "not available"}`;

      document.getElementById("sourceText").textContent =
        `Source: ${forecastData.sourceType || "unknown"} | ${forecastData.sourceUrl || "not available"}`;

      document.getElementById("catalogText").textContent =
        "Catalog mode: static WebP overlays in GitHub Pages";

      document.getElementById("serviceModeText").textContent =
        "Layer mode: GitHub Pages WebP image overlay";

      const slider = document.getElementById("hourSlider");
      const count = forecastData.hours ? forecastData.hours.length : 0;
      slider.max = String(Math.max(0, count - 1));
      slider.value = "0";
    }

    function getPeakHourIndex() {
      if (!forecastData?.hours?.length) return 0;

      let maxIndex = 0;
      let maxVal = -Infinity;

      forecastData.hours.forEach((h, i) => {
        const v = Number(h.navd88StageFt);
        if (v > maxVal) {
          maxVal = v;
          maxIndex = i;
        }
      });

      return maxIndex;
    }

    async function setFloodLayerFromStage(stageKey, token) {
      clearFloodLayer();
      setWarn("");
      setHardWarn("");

      const normalized = normalizeStageKey(stageKey);
      if (!normalized) {
        setWarn("Invalid stage value.");
        return;
      }

      const fileStem = stageKeyToFileStem(normalized);
      const overlayUrl = stageKeyToOverlayUrl(normalized);

      document.getElementById("serviceNameText").textContent =
        `Overlay file: ${fileStem}.webp`;

      document.getElementById("loadedUrlText").textContent =
        `Overlay URL: ${overlayUrl}`;

      showStageUrl(overlayUrl);

      setStatus(`Checking ${fileStem}.webp...`);

      const exists = await testImageUrl(overlayUrl);
      if (token !== lastRenderToken) return;

      if (!exists.ok) {
        setWarn(`Could not load overlay for ${normalized} ft.`);
        setHardWarn(
          `GitHub Pages could not find or serve this file:\n${overlayUrl}\n\nCheck that the file exists in assets/overlays and that GitHub Pages is publishing the repo/branch you expect.`
        );
        setStatus(`Overlay load failed for ${fileStem}.webp`);
        return;
      }

      ensureMap();

      let overlayBounds = FALLBACK_BOUNDS;

      try {
        overlayBounds = await getOverlayBoundsFromWorldFile(overlayUrl);
      } catch (err) {
        console.error(err);
        setWarn("Could not read the .pgw world file, so fallback bounds are being used.");
        setHardWarn(
          `World file read failed for:\n${overlayUrlToWorldFileUrl(overlayUrl)}\n\n${err.message}`
        );
      }

      if (token !== lastRenderToken) return;

      currentFloodLayer = L.imageOverlay(
        `${overlayUrl}?v=${Date.now()}`,
        overlayBounds,
        {
          opacity: overlayOpacity,
          interactive: false,
          crossOrigin: true,
          zIndex: 500
        }
      );

      currentFloodLayer.on("load", () => {
        if (token !== lastRenderToken) return;
        setStatus(`Loaded ${fileStem}.webp`);
      });

      currentFloodLayer.on("error", () => {
        if (token !== lastRenderToken) return;
        setWarn(`Could not draw overlay for ${normalized} ft.`);
        setHardWarn(`The image URL exists but Leaflet could not draw it:\n${overlayUrl}`);
        setStatus(`Overlay draw failed for ${fileStem}.webp`);
      });

      currentFloodLayer.addTo(map);

      if (!mapHasFit) {
        map.fitBounds(overlayBounds);
        mapHasFit = true;
      }
    }

    async function renderHour(index) {
      if (!forecastData?.hours?.length) return;

      const h = forecastData.hours[index];
      if (!h) return;

      document.getElementById("hourText").textContent = `Hour ${h.hourIndex}`;
      document.getElementById("timeText").textContent = `Time (UTC): ${h.timeUtc}`;
      document.getElementById("stageText").textContent =
        `Water level: ${Number(h.navd88StageFt).toFixed(1)} ft NAVD88`;
      document.getElementById("matchedText").textContent =
        `Matched overlay: ${h.matchedStageKey} ft NAVD88`;

      if (h.wasClamped) {
        setWarn(
          `Value was outside your published overlay range, so it was clamped to ${h.matchedStageKey} ft.`
        );
      } else {
        setWarn("");
      }

      const token = ++lastRenderToken;
      await setFloodLayerFromStage(h.matchedStageKey, token);
    }

    async function loadManualStage() {
      const raw = document.getElementById("manualStageInput").value.trim();
      const normalized = normalizeStageKey(raw);

      if (!normalized) {
        setWarn("Enter a valid numeric stage, like 5.0");
        return;
      }

      document.getElementById("hourText").textContent = "Manual stage";
      document.getElementById("timeText").textContent = "Time (UTC): not tied to forecast";
      document.getElementById("stageText").textContent =
        `Water level: ${normalized} ft NAVD88`;
      document.getElementById("matchedText").textContent =
        `Matched overlay: ${normalized} ft NAVD88`;

      setWarn("");

      const token = ++lastRenderToken;
      await setFloodLayerFromStage(normalized, token);
    }

    function stopPlayback() {
      if (playTimer) {
        clearInterval(playTimer);
        playTimer = null;
      }
    }

    function startPlayback() {
      stopPlayback();

      if (!forecastData?.hours?.length) return;

      const slider = document.getElementById("hourSlider");
      let i = Number(slider.value);

      playTimer = setInterval(() => {
        renderHour(i).catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
          stopPlayback();
        });

        slider.value = String(i);
        i += 1;
        if (i >= forecastData.hours.length) i = 0;
      }, 1500);
    }

    async function reloadAll() {
      stopPlayback();
      clearFloodLayer();
      setStatus("Reloading forecast...");

      await loadForecast();

      const peakIndex = getPeakHourIndex();
      document.getElementById("hourSlider").value = String(peakIndex);
      await renderHour(peakIndex);
    }

    async function main() {
      setOpacityText();

      document.getElementById("hourSlider").addEventListener("input", async (e) => {
        stopPlayback();
        await renderHour(Number(e.target.value));
      });

      document.getElementById("opacitySlider").addEventListener("input", (e) => {
        overlayOpacity = Number(e.target.value) / 100;
        setOpacityText();
        applyOverlayOpacity();
      });

      document.getElementById("playBtn").addEventListener("click", startPlayback);
      document.getElementById("stopBtn").addEventListener("click", stopPlayback);

      document.getElementById("reloadBtn").addEventListener("click", () => {
        reloadAll().catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
        });
      });

      document.getElementById("showUrlsBtn").addEventListener("click", () => {
        const text = document.getElementById("loadedUrlText").textContent || "";
        showStageUrl(text);
      });

      document.getElementById("manualStageBtn").addEventListener("click", () => {
        loadManualStage().catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
        });
      });

      await reloadAll();
    }

    main().catch(err => {
      console.error(err);
      setStatus(err.message);
      setWarn(err.message);
    });
  </script>
