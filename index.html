<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>North Wildwood Flood Forecast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root{
      --bg:#f3f4f6;
      --panel:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --accent:#2563eb;
      --accent-soft:#dbeafe;
      --shadow:0 18px 42px rgba(15,23,42,.08);
      --radius:22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100%;
    }

    #panel {
      padding: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-right: 1px solid var(--line);
      overflow: auto;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #d7dbe0;
    }

    .brand {
      display: grid;
      gap: 2px;
      padding: 2px 2px 10px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 0.98;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .section {
      margin-top: 14px;
      background: var(--panel);
      border: 1px solid rgba(229,231,235,.9);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .section.hidden-support {
      display: none;
    }

    .big {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-top: 4px;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 8px;
      accent-color: var(--accent);
    }

    button {
      padding: 11px 12px;
      margin-right: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 650;
      color: var(--text);
      transition: transform .16s ease, border-color .16s ease, background .16s ease, color .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.activeMode {
      background: var(--accent-soft);
      border-color: #bfdbfe;
      color: #1d4ed8;
    }

    #status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 2px 0 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    #warn, #hardWarn, #urlBox, #manualStageInput, #manualStageBtn, #showUrlsBtn,
    #overlayBaseText, #sourceText, #catalogText, #crsText, #serviceModeText,
    #placementText, #serviceNameText, #loadedUrlText, .pill {
      display: none !important;
    }

    .leaflet-image-layer {
      image-rendering: auto;
    }

    .grayscale-tiles {
      filter: grayscale(100%);
      -webkit-filter: grayscale(100%);
    }

    .transport-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric-box {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      min-height: 84px;
      background: #fff;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .control-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .control-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .control-value {
      color: var(--text);
      font-size: 13px;
      font-weight: 750;
    }

    @media (max-width: 980px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      #panel {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <div class="brand">
        <h1>North Wildwood<br>Flood Forecast</h1>
        <div class="muted">Stone Harbor driver station</div>
      </div>

      <div class="section">
        <div class="mode-buttons">
          <button id="depthModeBtn" class="activeMode">Flood Depth</button>
          <button id="dynamicModeBtn">Dynamic Flood</button>
        </div>
        <div id="modeText" class="muted" style="margin-top:8px;">Current overlay type: Flood Depth</div>
      </div>

      <div class="section">
        <div class="metric-grid">
          <div class="metric-box">
            <div class="metric-label">Time</div>
            <div id="timeText" class="big">--</div>
            <div id="issuedText" class="muted">--</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">Water level</div>
            <div id="stageText" class="big">--</div>
            <div id="matchedText" class="muted">--</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="control-head">
          <div class="control-label">Forecast hour</div>
          <div id="hourText" class="control-value">Hour 0</div>
        </div>
        <input id="hourSlider" type="range" min="0" max="71" value="0" step="1" />
      </div>

      <div class="section">
        <div class="control-head">
          <div class="control-label">Overlay opacity</div>
          <div id="opacityText" class="control-value">100%</div>
        </div>
        <input id="opacitySlider" type="range" min="0" max="100" value="100" step="1" />
      </div>

      <div class="section">
        <div class="transport-row">
          <button id="playBtn">Play</button>
          <button id="stopBtn">Stop</button>
          <button id="reloadBtn">Reload</button>
        </div>
      </div>

      <div id="status">Starting…</div>

      <!-- Hidden support elements kept so the original JS does not break -->
      <div class="section hidden-support"><div id="overlayBaseText"></div></div>
      <div class="section hidden-support">
        <div id="sourceText"></div>
        <div id="catalogText"></div>
        <div id="crsText"></div>
        <div id="serviceModeText"></div>
        <div id="placementText"></div>
        <div id="serviceNameText"></div>
        <div id="loadedUrlText"></div>
        <div id="warn"></div>
        <div id="hardWarn"></div>
        <textarea id="urlBox" readonly></textarea>
        <input id="manualStageInput" type="text" />
        <button id="manualStageBtn">Load</button>
        <button id="showUrlsBtn">Show overlay URL</button>
        <div class="pill">Shared TFW mode</div>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>
  <script src="https://unpkg.com/proj4leaflet@1.0.2/src/proj4leaflet.js"></script>

  <script>
    const APP_BASE = new URL(".", window.location.href);
    const FORECAST_URL = new URL("./forecast.json", APP_BASE).href;

    const OVERLAY_ROOTS = {
      depth: new URL("./assets/overlays/flooddepth/", APP_BASE).href,
      dynamic: new URL("./assets/overlays/dynamicflood/", APP_BASE).href
    };

    const DEFAULT_OVERLAY_MODE = "depth";
    const MIN_STAGE = -4.0;
    const MAX_STAGE = 14.0;
    const STAGE_STEP = 0.2;
    const FORECAST_MIN_VISIBLE_STAGE = 1.5;
    const FORECAST_FORCED_STAGE = 1.6;

    const NJ_BASEMAP_URL =
      "https://maps.nj.gov/arcgis/rest/services/Basemap/Orthos_Natural_2015_NJ/MapServer/tile/{z}/{y}/{x}";

    const SHARED_WORLD = {
      A: 7.5,
      D: 0.0,
      B: 0.0,
      E: -7.5,
      C: 401468.75,
      F: 70421.25
    };

    const NJSP_PROJ4 =
      "+proj=tmerc +lat_0=38.8333333333333 +lon_0=-74.5 +k=0.9999 +x_0=492125 +y_0=0 +ellps=GRS80 +units=us-ft +no_defs";

    const NJSP_CRS = new L.Proj.CRS("EPSG:6527", NJSP_PROJ4, {
      origin: [-17954600, 18705699.999999993],
      resolutions: [
        2006.2172023914932,
        1003.1086011953124,
        501.55430059809026,
        250.7771502986111,
        125.38857514930555,
        62.694287574652776,
        31.347143787326388,
        15.673571894097222,
        7.836785947048611,
        3.9183929730902776,
        1.9591964843749998,
        0.9795982430555555,
        0.48979912152777777
      ]
    });

    let map = null;
    let currentFloodLayer = null;
    let floodProjectedBounds = null;
    let floodLatLngBounds = null;
    let forecastData = null;
    let playTimer = null;
    let overlayOpacity = 1.0;
    let lastRenderToken = 0;
    let mapHasFit = false;
    let currentOverlayMode = DEFAULT_OVERLAY_MODE;
    let currentHourIndex = 0;

    const imageExistsCache = new Map();

    const easternFormatter = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/New_York",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
      hour12: true,
      timeZoneName: "short"
    });

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function setWarn(msg) {
      const el = document.getElementById("warn");
      if (!el) return;
      if (!msg) {
        el.style.display = "none";
        el.textContent = "";
      } else {
        el.style.display = "block";
        el.textContent = msg;
      }
    }

    function setHardWarn(msg) {
      const el = document.getElementById("hardWarn");
      if (!el) return;
      if (!msg) {
        el.style.display = "none";
        el.textContent = "";
      } else {
        el.style.display = "block";
        el.textContent = msg;
      }
    }

    function setOpacityText() {
      document.getElementById("opacityText").textContent =
        `${Math.round(overlayOpacity * 100)}%`;
    }

    function showStageUrl(text) {
      const box = document.getElementById("urlBox");
      if (!box) return;
      box.style.display = "block";
      box.value = text;
    }

    function updateModeButtons() {
      const depthBtn = document.getElementById("depthModeBtn");
      const dynamicBtn = document.getElementById("dynamicModeBtn");

      depthBtn.classList.toggle("activeMode", currentOverlayMode === "depth");
      dynamicBtn.classList.toggle("activeMode", currentOverlayMode === "dynamic");

      document.getElementById("modeText").textContent =
        `Current overlay type: ${currentOverlayMode === "depth" ? "Flood Depth" : "Dynamic Flood"}`;

      document.getElementById("overlayBaseText").textContent =
        `Overlay base: ${OVERLAY_ROOTS[currentOverlayMode]}`;
    }

    function formatEasternTime(isoString) {
      if (!isoString) return "--";
      const d = new Date(isoString);
      if (Number.isNaN(d.getTime())) return "--";
      return easternFormatter.format(d);
    }

    async function fetchJson(url, params = null) {
      const u = new URL(url);
      if (params) {
        for (const [k, v] of Object.entries(params)) {
          u.searchParams.set(k, v);
        }
      }

      const r = await fetch(u.toString(), { cache: "no-store" });
      if (!r.ok) {
        throw new Error(`HTTP ${r.status} for ${u.toString()}`);
      }
      return r.json();
    }

    function clampStage(value) {
      return Math.max(MIN_STAGE, Math.min(MAX_STAGE, value));
    }

    function roundToOneDecimal(value) {
      return Number(value.toFixed(1));
    }

    function floorToCatalogStep(value) {
      const stepped = Math.floor((value + 1e-9) / STAGE_STEP) * STAGE_STEP;
      return roundToOneDecimal(stepped);
    }

    function getForecastOverlayStage(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return null;

      if (n < FORECAST_MIN_VISIBLE_STAGE) {
        return FORECAST_FORCED_STAGE;
      }

      const clipped = clampStage(n);
      return clampStage(floorToCatalogStep(clipped));
    }

    function getManualOverlayStage(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return null;

      if (n < FORECAST_MIN_VISIBLE_STAGE) {
        return FORECAST_FORCED_STAGE;
      }

      const clipped = clampStage(n);
      return clampStage(floorToCatalogStep(clipped));
    }

    function stageToCode(stageValue) {
      const n = Number(stageValue);
      const sign = n < 0 ? "n" : "p";
      const tenths = Math.round(Math.abs(n) * 10);
      return `${sign}${String(tenths).padStart(3, "0")}`;
    }

    function getOverlayFilename(mode, stageValue) {
      const code = stageToCode(stageValue);

      if (mode === "depth") return `Depth${code}.png`;
      if (mode === "dynamic") return `DynamicFlood_${code}.png`;

      throw new Error(`Unknown overlay mode: ${mode}`);
    }

    function getOverlayUrl(mode, stageValue) {
      return new URL(getOverlayFilename(mode, stageValue), OVERLAY_ROOTS[mode]).href;
    }

    function projectedPointToLatLng(x, y) {
      return NJSP_CRS.unproject(L.point(x, y));
    }

    function computeProjectedBounds(width, height) {
      const { A, D, B, E, C, F } = SHARED_WORLD;

      if (Math.abs(B) > 1e-12 || Math.abs(D) > 1e-12) {
        throw new Error("Shared world file contains rotation or skew. This page assumes north-up rasters.");
      }

      const west  = C - (A / 2);
      const north = F - (E / 2);
      const east  = C + A * (width  - 0.5);
      const south = F + E * (height - 0.5);

      return { west, south, east, north };
    }

    async function loadImageMeta(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();

        img.onload = () => {
          resolve({
            width: img.naturalWidth,
            height: img.naturalHeight
          });
        };

        img.onerror = () => {
          reject(new Error(`Could not load image: ${url}`));
        };

        img.src = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
      });
    }

    async function testImageUrl(url) {
      if (imageExistsCache.has(url)) {
        return imageExistsCache.get(url);
      }

      const result = await new Promise((resolve) => {
        const img = new Image();

        img.onload = () => resolve({ ok: true });
        img.onerror = () => resolve({ ok: false });

        img.src = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
      });

      imageExistsCache.set(url, result);
      return result;
    }

    function preloadImage(url) {
      const img = new Image();
      img.src = url;
    }

    function preloadAroundHour(index) {
      if (!forecastData?.hours?.length) return;

      const offsets = [0, 1, -1, 2, -2];

      for (const offset of offsets) {
        const i = index + offset;
        if (i < 0 || i >= forecastData.hours.length) continue;

        const stage = getForecastOverlayStage(forecastData.hours[i].navd88StageFt);
        if (stage === null) continue;

        preloadImage(getOverlayUrl("depth", stage));
        preloadImage(getOverlayUrl("dynamic", stage));
      }
    }

    async function ensureOverlayBounds(sampleOverlayUrl) {
      if (floodProjectedBounds && floodLatLngBounds) return;

      const meta = await loadImageMeta(sampleOverlayUrl);

      if (!meta.width || !meta.height) {
        throw new Error(`Could not read image size for ${sampleOverlayUrl}`);
      }

      const b = computeProjectedBounds(meta.width, meta.height);

      floodProjectedBounds = L.bounds(
        [b.west, b.south],
        [b.east, b.north]
      );

      floodLatLngBounds = L.latLngBounds(
        projectedPointToLatLng(b.west, b.south),
        projectedPointToLatLng(b.east, b.north)
      );

      document.getElementById("placementText").textContent =
        "Overlay placement: shared Depthn002.tfw values applied to all PNGs";
    }

    function ensureMap() {
      if (map) return;

      map = L.map("map", {
        crs: NJSP_CRS,
        zoomControl: true,
        minZoom: 0,
        maxZoom: 12,
        continuousWorld: true,
        worldCopyJump: false,
        zoomSnap: 1,
        zoomDelta: 1
      });

      L.tileLayer(NJ_BASEMAP_URL, {
        attribution: "NJ OGIS Orthophoto 2015",
        tileSize: 512,
        minZoom: 0,
        maxZoom: 12,
        noWrap: true,
        updateWhenIdle: true,
        keepBuffer: 2,
        className: "grayscale-tiles"
      }).addTo(map);

      document.getElementById("crsText").textContent =
        "Map CRS: NJ State Plane (ftUS) using the flood overlay transform";
    }

    function clearFloodLayer() {
      if (currentFloodLayer && map) {
        map.removeLayer(currentFloodLayer);
        currentFloodLayer = null;
      }
    }

    function applyOverlayOpacity() {
      if (currentFloodLayer && typeof currentFloodLayer.setOpacity === "function") {
        currentFloodLayer.setOpacity(overlayOpacity);
      }
    }

    async function loadForecast() {
      forecastData = await fetchJson(FORECAST_URL);

      updateModeButtons();

      document.getElementById("issuedText").textContent =
        forecastData.issuedUtc ? `Updated ${formatEasternTime(forecastData.issuedUtc)}` : "--";

      document.getElementById("sourceText").textContent =
        `Source: ${forecastData.sourceType || "unknown"} | ${forecastData.sourceUrl || "not available"}`;

      document.getElementById("catalogText").textContent =
        "Catalog mode: PNG overlays in 0.2 ft steps from -4.0 to +14.0. Forecast display floors to the next lower 0.2 ft stage, except anything below 1.5 ft uses the 1.6 ft raster.";

      document.getElementById("serviceModeText").textContent =
        "Layer mode: projected flood PNG overlay over a stable greyscale tile basemap";

      const slider = document.getElementById("hourSlider");
      const count = forecastData.hours ? forecastData.hours.length : 0;
      slider.max = String(Math.max(0, count - 1));
      slider.value = "0";
    }

    function getPeakHourIndex() {
      if (!forecastData?.hours?.length) return 0;

      let maxIndex = 0;
      let maxVal = -Infinity;

      forecastData.hours.forEach((h, i) => {
        const v = Number(h.navd88StageFt);
        if (v > maxVal) {
          maxVal = v;
          maxIndex = i;
        }
      });

      return maxIndex;
    }

    async function setFloodLayer(mode, stageValue, token) {
      clearFloodLayer();
      setWarn("");
      setHardWarn("");

      const filename = getOverlayFilename(mode, stageValue);
      const overlayUrl = getOverlayUrl(mode, stageValue);

      document.getElementById("serviceNameText").textContent =
        `Overlay file: ${filename}`;

      document.getElementById("loadedUrlText").textContent =
        `Overlay URL: ${overlayUrl}`;

      showStageUrl(overlayUrl);

      setStatus(`Checking ${filename}...`);

      const exists = await testImageUrl(overlayUrl);
      if (token !== lastRenderToken) return;

      if (!exists.ok) {
        setWarn(`Could not load overlay for ${stageValue.toFixed(1)} ft.`);
        setHardWarn(`GitHub Pages could not find or serve this file:\n${overlayUrl}`);
        setStatus(`Overlay load failed for ${filename}`);
        return;
      }

      ensureMap();

      try {
        await ensureOverlayBounds(overlayUrl);
      } catch (err) {
        setWarn(err.message);
        setHardWarn(`Projected overlay setup failed.\n\n${err.message}`);
        setStatus("Projected overlay setup failed");
        return;
      }

      if (token !== lastRenderToken) return;

      currentFloodLayer = L.Proj.imageOverlay(
        `${overlayUrl}?v=${Date.now()}`,
        floodProjectedBounds,
        {
          opacity: overlayOpacity,
          interactive: false,
          crossOrigin: true,
          zIndex: 500
        }
      );

      currentFloodLayer.on("load", () => {
        if (token !== lastRenderToken) return;
        setStatus(`Loaded ${filename}`);
      });

      currentFloodLayer.on("error", () => {
        if (token !== lastRenderToken) return;
        setWarn(`Could not draw overlay for ${stageValue.toFixed(1)} ft.`);
        setHardWarn(`The image URL exists but Leaflet could not draw it:\n${overlayUrl}`);
        setStatus(`Overlay draw failed for ${filename}`);
      });

      currentFloodLayer.addTo(map);

      if (!mapHasFit && floodLatLngBounds) {
        map.fitBounds(floodLatLngBounds, { padding: [10, 10] });
        mapHasFit = true;
      }
    }

    function buildForecastNotes(rawStage, matchedStage) {
      const notes = [];

      if (rawStage < FORECAST_MIN_VISIBLE_STAGE) {
        notes.push(`Any forecast stage below ${FORECAST_MIN_VISIBLE_STAGE.toFixed(1)} ft is forced to the ${FORECAST_FORCED_STAGE.toFixed(1)} ft raster.`);
      } else if (Math.abs(rawStage - matchedStage) > 0.0001) {
        notes.push(`Forecast was rounded down to the nearest published flood PNG: ${matchedStage.toFixed(1)} ft.`);
      }

      if (rawStage > MAX_STAGE) {
        notes.push(`Value was above the published range and was clamped to ${matchedStage.toFixed(1)} ft.`);
      }

      return notes.join("\n");
    }

    async function renderHour(index) {
      if (!forecastData?.hours?.length) return;

      const h = forecastData.hours[index];
      if (!h) return;

      currentHourIndex = index;

      const rawStage = Number(h.navd88StageFt);
      const displayStage = getForecastOverlayStage(rawStage);

      if (displayStage === null) {
        setWarn("Forecast stage is not numeric.");
        return;
      }

      document.getElementById("hourText").textContent = `Hour ${h.hourIndex ?? index}`;
      document.getElementById("timeText").textContent = formatEasternTime(h.timeUtc);
      document.getElementById("stageText").textContent = `${rawStage.toFixed(2)} ft`;
      document.getElementById("matchedText").textContent = `Showing ${displayStage.toFixed(1)} ft`;

      setWarn(buildForecastNotes(rawStage, displayStage));

      const token = ++lastRenderToken;
      await setFloodLayer(currentOverlayMode, displayStage, token);

      preloadAroundHour(index);
    }

    async function loadManualStage() {
      const raw = document.getElementById("manualStageInput").value.trim();
      const n = Number(raw);

      if (!Number.isFinite(n)) {
        setWarn("Enter a valid numeric stage, like 5.0");
        return;
      }

      const displayStage = getManualOverlayStage(n);
      if (displayStage === null) {
        setWarn("Enter a valid numeric stage, like 5.0");
        return;
      }

      document.getElementById("hourText").textContent = "Manual stage";
      document.getElementById("timeText").textContent = "--";
      document.getElementById("stageText").textContent = `${n.toFixed(2)} ft`;
      document.getElementById("matchedText").textContent = `Showing ${displayStage.toFixed(1)} ft`;

      const token = ++lastRenderToken;
      await setFloodLayer(currentOverlayMode, displayStage, token);
    }

    function stopPlayback() {
      if (playTimer) {
        clearInterval(playTimer);
        playTimer = null;
      }
    }

    function startPlayback() {
      stopPlayback();

      if (!forecastData?.hours?.length) return;

      const slider = document.getElementById("hourSlider");
      let i = Number(slider.value);

      playTimer = setInterval(() => {
        renderHour(i).catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
          stopPlayback();
        });

        slider.value = String(i);
        i += 1;
        if (i >= forecastData.hours.length) i = 0;
      }, 1500);
    }

    async function switchOverlayMode(mode) {
      if (mode === currentOverlayMode) return;
      currentOverlayMode = mode;
      updateModeButtons();
      await renderHour(currentHourIndex);
    }

    async function reloadAll() {
      stopPlayback();
      clearFloodLayer();
      setStatus("Reloading forecast...");

      await loadForecast();

      const peakIndex = getPeakHourIndex();
      currentHourIndex = peakIndex;
      document.getElementById("hourSlider").value = String(peakIndex);
      await renderHour(peakIndex);
    }

    async function main() {
      setOpacityText();
      updateModeButtons();

      document.getElementById("hourSlider").addEventListener("input", async (e) => {
        stopPlayback();
        await renderHour(Number(e.target.value));
      });

      document.getElementById("opacitySlider").addEventListener("input", (e) => {
        overlayOpacity = Number(e.target.value) / 100;
        setOpacityText();
        applyOverlayOpacity();
      });

      document.getElementById("depthModeBtn").addEventListener("click", () => {
        switchOverlayMode("depth").catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
        });
      });

      document.getElementById("dynamicModeBtn").addEventListener("click", () => {
        switchOverlayMode("dynamic").catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
        });
      });

      document.getElementById("playBtn").addEventListener("click", startPlayback);
      document.getElementById("stopBtn").addEventListener("click", stopPlayback);

      document.getElementById("reloadBtn").addEventListener("click", () => {
        reloadAll().catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
        });
      });

      document.getElementById("showUrlsBtn").addEventListener("click", () => {
        const text = document.getElementById("loadedUrlText").textContent || "";
        showStageUrl(text);
      });

      document.getElementById("manualStageBtn").addEventListener("click", () => {
        loadManualStage().catch(err => {
          console.error(err);
          setStatus(err.message);
          setWarn(err.message);
        });
      });

      await reloadAll();
    }

    main().catch(err => {
      console.error(err);
      setStatus(err.message);
      setWarn(err.message);
    });
  </script>
</body>
</html>
