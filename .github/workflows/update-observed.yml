name: Update observed cache

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-observed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Build observed.json
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          observed = {
              "site": "01411360",
              "parameterCd": "72279",
              "datum": "NAVD88",
              "timeZone": "EST",
              "method": "hourly_max_all_history_v1",
              "lastProcessedISO": None,
              "archiveStartDate": None,
              "archiveEndDate": None,
              "thresholdsNAVD88": {
                  "minorLow": 3.25,
                  "moderateLow": 4.25,
                  "majorLow": 5.25
              },
              "days": []
          }

          Path("observed.json").write_text(
              json.dumps(observed, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Commit observed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add observed.json
          git diff --cached --quiet || git commit -m "Update observed cache"
          git push
