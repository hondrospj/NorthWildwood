name: Update Stone Harbor forecast

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build forecast.json from NOAA CO-OPS predictions
        shell: bash
        run: |
          python - <<'PY'
          import json
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          STATION_ID = "8535581"
          STATION_NAME = "STONE HARBOR, GREAT CHANNEL, NJ"

          # Your flood rasters exist from -2.0 to +14.0 NAVD88 in 0.1-ft increments.
          MIN_LAYER_STAGE = -2.0
          MAX_LAYER_STAGE = 14.0
          MAX_HOURS = 72

          OUT_PATH = Path("forecast.json")

          def round_tenth(x):
              return round(float(x) * 10.0) / 10.0

          def clamp_stage(stage):
              return max(MIN_LAYER_STAGE, min(MAX_LAYER_STAGE, stage))

          def fetch_json(url):
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          # Use UTC so the timestamps line up cleanly in the web app.
          now_utc = datetime.now(timezone.utc).replace(minute=0, second=0, microsecond=0)

          params = {
              "product": "predictions",
              "application": "NW_Flood_Viewer",
              "station": STATION_ID,
              "begin_date": now_utc.strftime("%Y%m%d %H:%M"),
              "range": str(MAX_HOURS),
              "datum": "NAVD",
              "units": "english",
              "time_zone": "gmt",
              "interval": "h",
              "format": "json"
          }

          source_url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?" + urllib.parse.urlencode(params)
          data = fetch_json(source_url)

          if "predictions" not in data:
              raise RuntimeError(f"NOAA API returned no predictions: {data}")

          preds = data["predictions"]
          if len(preds) < MAX_HOURS:
              raise RuntimeError(f"Expected {MAX_HOURS} hourly predictions, got {len(preds)}")

          hours = []
          for hour_index, row in enumerate(preds[:MAX_HOURS]):
              navd88_ft = round_tenth(row["v"])
              matched_ft = round_tenth(clamp_stage(navd88_ft))
              was_clamped = matched_ft != navd88_ft

              # NOAA returns "t" like "2026-04-01 19:00"
              dt_utc = datetime.strptime(row["t"], "%Y-%m-%d %H:%M").replace(tzinfo=timezone.utc)

              hours.append({
                  "hourIndex": hour_index,
                  "timeUtc": dt_utc.isoformat().replace("+00:00", "Z"),
                  "sourceStageFt": navd88_ft,
                  "sourceDatum": "NAVD88",
                  "navd88StageFt": navd88_ft,
                  "matchedStageKey": f"{matched_ft:.1f}",
                  "wasClamped": was_clamped
              })

          payload = {
              "stationId": STATION_ID,
              "stationName": STATION_NAME,
              "issuedUtc": now_utc.isoformat().replace("+00:00", "Z"),
              "sourceUrl": source_url,
              "sourceType": "NOAA_COOPS_predictions_NAVD_hourly",
              "hours": hours
          }

          OUT_PATH.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print("Wrote", OUT_PATH)
          print("Source URL:", source_url)
          print("First 5 stages:", [h["navd88StageFt"] for h in hours[:5]])
          PY

      - name: Commit updated forecast
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecast.json
          git diff --staged --quiet || git commit -m "Update Stone Harbor forecast"
          git push
