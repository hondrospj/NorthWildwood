name: Update PETSS forecast

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build forecast.json from operational PETSS text
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import urllib.request
          import urllib.error
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          # -----------------------------
          # USER SETTINGS
          # -----------------------------
          TARGET_STATION_ID = "8535581"
          TARGET_NAME_ALIASES = [
              "STONE HARBOR",
              "GREAT CHANNEL",
              "STONE HARBOR, NJ",
              "STONE HARBOR"
          ]

          # Your setup: PETSS and rasters are already NAVD88
          INPUT_DATUM = "NAVD88"

          MIN_LAYER_STAGE = -2.0
          MAX_LAYER_STAGE = 14.0
          MAX_HOURS = 72

          PETSS_ROOT = "https://nomads.ncep.noaa.gov/pub/data/nccf/com/petss/prod"
          CYCLES = ["18", "12", "06", "00"]
          LOOKBACK_DAYS = 3

          FORECAST_PATH = Path("forecast.json")
          INDEX_PATH = Path("petss_station_index.json")

          def round_tenth(x):
              return round(float(x) * 10.0) / 10.0

          def clamp_stage(stage):
              return max(MIN_LAYER_STAGE, min(MAX_LAYER_STAGE, stage))

          def fetch_text(url):
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return resp.read().decode("utf-8", "replace")

          def build_candidates():
              now_utc = datetime.now(timezone.utc)
              dates = [now_utc.date() - timedelta(days=i) for i in range(LOOKBACK_DAYS)]
              out = []
              for d in dates:
                  ymd = d.strftime("%Y%m%d")
                  for cyc in CYCLES:
                      issue_dt = datetime.strptime(f"{ymd}{cyc}", "%Y%m%d%H").replace(tzinfo=timezone.utc)
                      url = f"{PETSS_ROOT}/petss.{ymd}/petss.t{cyc}z.mean.stormtide.east.txt"
                      out.append((issue_dt, url))
              out.sort(reverse=True)
              return out

          def fetch_latest_petss_text():
              last_error = None
              for issue_dt, url in build_candidates():
                  try:
                      text = fetch_text(url)
                      if "GEFS BASED STORM TIDE" in text.upper():
                          return issue_dt, url, text
                  except Exception as e:
                      last_error = e
              raise RuntimeError(f"Could not find a recent operational PETSS mean stormtide east text file. Last error: {last_error}")

          def normalize_for_match(s):
              return re.sub(r"[^A-Z0-9]+", " ", str(s).upper()).strip()

          def is_station_id(tok):
              return re.fullmatch(r"\d{7,8}", tok) is not None

          def is_integer(tok):
              return re.fullmatch(r"-?\d+", tok) is not None

          def preprocess_text(text):
              # Drop the bulletin header before the first station id
              m = re.search(r"\b\d{7,8}\s+[A-Z]", text)
              if m:
                  text = text[m.start():]

              # Fix glued negatives like -97-400
              text = re.sub(r"(?<=\d)-(?=\d)", " -", text)

              # Normalize whitespace
              text = text.replace("\r", "\n")
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def parse_station_blocks(text):
              text = preprocess_text(text)
              tokens = text.split(" ")

              stations = []
              i = 0
              n = len(tokens)

              while i < n:
                  tok = tokens[i]

                  if not is_station_id(tok):
                      i += 1
                      continue

                  station_id = tok
                  i += 1

                  # Collect station name until the first integer token
                  name_parts = []
                  while i < n and not is_integer(tokens[i]):
                      # If we somehow hit another station id before numbers, abort this candidate
                      if is_station_id(tokens[i]):
                          break
                      name_parts.append(tokens[i])
                      i += 1

                  values = []
                  while i < n:
                      tok2 = tokens[i]

                      # Next station begins
                      if is_station_id(tok2):
                          if i + 1 < n and not is_integer(tokens[i + 1]):
                              break

                      if is_integer(tok2):
                          values.append(int(tok2))
                      i += 1

                  station_name = " ".join(name_parts).strip()

                  stations.append({
                      "stationId": station_id,
                      "stationName": station_name,
                      "values": values
                  })

              return stations

          def write_station_index(stations, source_url, issue_dt):
              payload = {
                  "issuedUtc": issue_dt.isoformat().replace("+00:00", "Z"),
                  "sourceUrl": source_url,
                  "count": len(stations),
                  "stations": [
                      {
                          "stationId": s["stationId"],
                          "stationName": s["stationName"],
                          "valueCount": len(s["values"])
                      }
                      for s in stations
                  ]
              }
              INDEX_PATH.write_text(json.dumps(payload, indent=2), encoding="utf-8")

          def choose_station(stations):
              # 1) Exact id match with enough values
              for s in stations:
                  if s["stationId"] == TARGET_STATION_ID and len(s["values"]) >= MAX_HOURS:
                      return s

              # 2) Name alias match
              for s in stations:
                  name_norm = normalize_for_match(s["stationName"])
                  if len(s["values"]) < MAX_HOURS:
                      continue
                  for alias in TARGET_NAME_ALIASES:
                      if normalize_for_match(alias) in name_norm:
                          return s

              # 3) Loose harbor/channel fallback
              for s in stations:
                  name_norm = normalize_for_match(s["stationName"])
                  if len(s["values"]) < MAX_HOURS:
                      continue
                  if "HARBOR" in name_norm or "CHANNEL" in name_norm or "WILDWOOD" in name_norm:
                      return s

              return None

          def build_forecast_payload(issue_dt, source_url, station):
              hours = []
              vals = station["values"][:MAX_HOURS]

              for hour_index, navd88_ft_tenths in enumerate(vals):
                  navd88_ft = round_tenth(navd88_ft_tenths / 10.0)

                  matched_ft = round_tenth(clamp_stage(navd88_ft))
                  was_clamped = matched_ft != navd88_ft

                  hours.append({
                      "hourIndex": hour_index,
                      "timeUtc": (issue_dt + timedelta(hours=hour_index + 1)).isoformat().replace("+00:00", "Z"),
                      "sourceStageFt": navd88_ft,
                      "sourceDatum": INPUT_DATUM,
                      "navd88StageFt": navd88_ft,
                      "matchedStageKey": f"{matched_ft:.1f}",
                      "wasClamped": was_clamped
                  })

              return {
                  "stationIdRequested": TARGET_STATION_ID,
                  "stationAliasesRequested": TARGET_NAME_ALIASES,
                  "stationIdMatched": station["stationId"],
                  "stationNameMatched": station["stationName"],
                  "issuedUtc": issue_dt.isoformat().replace("+00:00", "Z"),
                  "sourceUrl": source_url,
                  "inputDatum": INPUT_DATUM,
                  "hours": hours
              }

          issue_dt, source_url, text = fetch_latest_petss_text()
          stations = parse_station_blocks(text)
          write_station_index(stations, source_url, issue_dt)

          chosen = choose_station(stations)

          if chosen is None:
              # Do not fail hard. Write a diagnostic forecast so the site still loads.
              payload = {
                  "error": "No PETSS station match found.",
                  "stationIdRequested": TARGET_STATION_ID,
                  "stationAliasesRequested": TARGET_NAME_ALIASES,
                  "issuedUtc": issue_dt.isoformat().replace("+00:00", "Z"),
                  "sourceUrl": source_url,
                  "inputDatum": INPUT_DATUM,
                  "hours": []
              }
              FORECAST_PATH.write_text(json.dumps(payload, indent=2), encoding="utf-8")
              print("No station match found.")
              print("Wrote debug station index to", INDEX_PATH)
              print("Wrote diagnostic forecast to", FORECAST_PATH)
          else:
              payload = build_forecast_payload(issue_dt, source_url, chosen)
              FORECAST_PATH.write_text(json.dumps(payload, indent=2), encoding="utf-8")
              print("Matched station:", chosen["stationId"], chosen["stationName"])
              print("Value count:", len(chosen["values"]))
              print("Wrote", FORECAST_PATH)
              print("Wrote", INDEX_PATH)
              print("First 5 stages:", [h["navd88StageFt"] for h in payload["hours"][:5]])
          PY

      - name: Commit updated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecast.json petss_station_index.json
          git diff --staged --quiet || git commit -m "Update PETSS forecast and station index"
          git push
