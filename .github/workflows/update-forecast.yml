name: Update PETSS forecast

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build forecast.json
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import re
          import tarfile
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          STATION_ID = "8535581"
          STATION_NAME = "STONE HARBOR, GREAT CHANNEL, NJ"

          # Your setup: PETSS and rasters are already NAVD88
          INPUT_DATUM = "NAVD88"

          MIN_LAYER_STAGE = -2.0
          MAX_LAYER_STAGE = 14.0
          MAX_HOURS = 72

          PETSS_ROOT = "https://nomads.ncep.noaa.gov/pub/data/nccf/com/petss/prod"
          CYCLES = ["18", "12", "06", "00"]
          LOOKBACK_DAYS = 3

          OUT_PATH = Path("forecast.json")

          def round_tenth(x):
              return round(float(x) * 10.0) / 10.0

          def clamp_stage(stage):
              return max(MIN_LAYER_STAGE, min(MAX_LAYER_STAGE, stage))

          def fetch_bytes(url):
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return resp.read()

          def build_candidates():
              now_utc = datetime.now(timezone.utc)
              dates = [now_utc.date() - timedelta(days=i) for i in range(LOOKBACK_DAYS)]
              out = []
              for d in dates:
                  ymd = d.strftime("%Y%m%d")
                  for cyc in CYCLES:
                      issue_dt = datetime.strptime(f"{ymd}{cyc}", "%Y%m%d%H").replace(tzinfo=timezone.utc)
                      url = f"{PETSS_ROOT}/petss.{ymd}/petss.t{cyc}z.csv.tar.gz"
                      out.append((issue_dt, url))
              out.sort(reverse=True)
              return out

          def normalize_text(s):
              return re.sub(r"[^A-Z0-9]+", " ", str(s).upper()).strip()

          def is_number(s):
              try:
                  float(str(s).strip())
                  return True
              except Exception:
                  return False

          def row_matches_station(row):
              joined = " | ".join(str(x) for x in row)
              norm = normalize_text(joined)

              if STATION_ID in norm:
                  return True

              return (
                  "STONE HARBOR" in norm and
                  "GREAT CHANNEL" in norm
              )

          def extract_72_values_from_row(row):
              nums = []
              for cell in row:
                  cell = str(cell).strip()
                  if is_number(cell):
                      nums.append(float(cell))

              # Use the last 72 numeric values in the row.
              if len(nums) >= MAX_HOURS:
                  vals = nums[-MAX_HOURS:]
                  return [round_tenth(v) for v in vals]

              return None

          def try_parse_csv_text(text, member_name):
              lines = text.splitlines()
              if not lines:
                  return None

              sample = "\n".join(lines[:10])
              try:
                  dialect = csv.Sniffer().sniff(sample)
              except Exception:
                  dialect = csv.excel

              reader = csv.reader(lines, dialect)

              for row in reader:
                  if not row:
                      continue
                  if row_matches_station(row):
                      vals = extract_72_values_from_row(row)
                      if vals:
                          print(f"Matched station in {member_name}")
                          return vals

              return None

          def fetch_latest_petss_csv_tar():
              last_error = None

              for issue_dt, url in build_candidates():
                  try:
                      blob = fetch_bytes(url)
                      if len(blob) > 1000:
                          return issue_dt, url, blob
                  except Exception as e:
                      last_error = e

              raise RuntimeError(f"Could not find a recent PETSS csv tarball. Last error: {last_error}")

          def extract_station_series_from_tar(blob):
              with tarfile.open(fileobj=io.BytesIO(blob), mode="r:gz") as tf:
                  members = [m for m in tf.getmembers() if m.isfile() and m.name.lower().endswith(".csv")]
                  print("CSV files in tarball:", len(members))

                  for m in members:
                      f = tf.extractfile(m)
                      if f is None:
                          continue

                      try:
                          text = f.read().decode("utf-8", "replace")
                      except Exception:
                          continue

                      vals = try_parse_csv_text(text, m.name)
                      if vals:
                          return vals, m.name

              raise RuntimeError(
                  f"Could not find station {STATION_ID} / {STATION_NAME} in any CSV inside the PETSS tarball."
              )

          issue_dt, source_url, blob = fetch_latest_petss_csv_tar()
          values, matched_member = extract_station_series_from_tar(blob)

          hours = []
          for hour_index, navd88_ft in enumerate(values[:MAX_HOURS]):
              navd88_ft = round_tenth(navd88_ft)

              matched_ft = round_tenth(clamp_stage(navd88_ft))
              was_clamped = matched_ft != navd88_ft

              hours.append({
                  "hourIndex": hour_index,
                  "timeUtc": (issue_dt + timedelta(hours=hour_index + 1)).isoformat().replace("+00:00", "Z"),
                  "sourceStageFt": navd88_ft,
                  "sourceDatum": INPUT_DATUM,
                  "navd88StageFt": navd88_ft,
                  "matchedStageKey": f"{matched_ft:.1f}",
                  "wasClamped": was_clamped
              })

          payload = {
              "stationId": STATION_ID,
              "stationNameConfigured": STATION_NAME,
              "issuedUtc": issue_dt.isoformat().replace("+00:00", "Z"),
              "sourceUrl": source_url,
              "sourceMember": matched_member,
              "inputDatum": INPUT_DATUM,
              "hours": hours
          }

          OUT_PATH.write_text(json.dumps(payload, indent=2), encoding="utf-8")

          print("Wrote", OUT_PATH)
          print("Source tarball:", source_url)
          print("Matched CSV member:", matched_member)
          print("First 5 stages:", [h["navd88StageFt"] for h in hours[:5]])
          PY

      - name: Commit updated forecast
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecast.json
          git diff --staged --quiet || git commit -m "Update PETSS forecast"
          git push
